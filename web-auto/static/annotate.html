<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>web-auto 标注工作区</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css?v=20260320.03" />
</head>
<body>
  <header class="topbar">
    <div class="row topbar-row">
      <div class="ctl-group">
        <button id="backToProjectsBtn" title="返回项目管理页，不会删除当前项目。">返回项目页</button>
      </div>
      <span class="muted">标注工作区（目录已锁定，若需更换请返回项目页新建项目）</span>
      <div class="spacer"></div>
      <div class="ctl-group">
        <button id="themeToggleBtn" title="切换浅色/深色界面显示。">深色模式</button>
      </div>
    </div>

    <div class="row hidden-tools">
      <label>项目名 <input id="projectName" /></label>
      <label>数据集目录 <input id="imageDir" /></label>
      <label>标注保存目录 <input id="saveDir" /></label>
      <button id="openProjectBtn" title="按填写的目录创建新项目。">新建项目</button>
      <button id="refreshProjectsBtn" title="刷新项目列表与统计信息。">刷新项目列表</button>
      <button id="closeProjectBtn" title="退出当前项目，但不会删除项目文件。">退出当前项目</button>
      <button id="deleteProjectBtn" title="删除当前项目记录、状态与标注，不删除原始图片。">删除当前项目</button>
      <div id="projectList"></div>
    </div>

    <div class="row topbar-row topbar-actions">
      <div class="ctl-group topbar-configs">
        <label class="compact-field">API地址 <input id="apiBaseUrl" class="input-api" value="http://172.16.1.65:8001" /></label>
        <button id="testApiBtn" class="compact-btn" title="测试当前 API 地址是否可用。">测试</button>
        <label class="compact-field">阈值 <input id="threshold" class="input-mini" type="number" min="0" max="1" step="0.01" value="0.5" /></label>
        <label class="compact-field" title="文本批处理每次发送到远端的图片数量。过大可能导致显存不足。">批大小 <input id="batchSize" class="input-mini" type="number" min="1" max="32" step="1" value="8" /></label>
      </div>
      <div class="ctl-group topbar-actions-main">
        <button id="inferCurrentBtn" class="compact-btn" title="对当前图片按已勾选类别做文本推理。">当前图推理</button>
        <button id="inferAllBtn" class="compact-btn" title="当前仅文本模式支持官方多图批处理；点/框/范例模式仍不走多图 batch。批大小过大可能导致远端显存不足。">全图文本批推</button>
        <div class="menu-anchor" id="exampleMenuAnchor">
          <button id="exampleMenuBtn" class="compact-btn" title="打开范例操作菜单。" aria-expanded="false">范例 ▾</button>
          <div id="exampleMenuPanel" class="menu-panel hidden">
            <button id="exampleCurrentBtn" class="menu-item-btn" title="按当前类别和正负框做当前图范例分割。至少需要一个正框。">当前图范例分割</button>
            <button id="exampleBatchBtn" class="menu-item-btn" title="用当前图片的框选范例传播到整个图集。至少需要一个正框。">全图集范例传播</button>
          </div>
        </div>
        <button id="smartFilterBtn" class="compact-btn" title="扫描当前项目中被同类大目标覆盖的小目标，并按规则预览可合并项。">智能过滤</button>
        <button id="exportBtn" class="compact-btn" title="导出当前项目标注为 COCO 或 YOLO。">导出</button>
      </div>
    </div>

    <div class="row topbar-row status-row">
      <span id="status" class="status"></span>
    </div>

    <div id="inferProgressWrap" class="row topbar-row progress-row">
      <div class="progress-head">
        <span id="inferProgressText" class="status">无事件</span>
        <span id="inferProgressMeta" class="status">--</span>
      </div>
      <div class="progress-main">
        <div class="progress-track">
          <div id="inferProgressBar" class="progress-bar"></div>
        </div>
        <div class="progress-actions">
          <button id="stopInferJobBtn" class="compact-btn" title="强制中断当前批量任务；已完成部分会保留，可改参数后继续。" disabled>停止</button>
          <button id="resumeInferJobBtn" class="compact-btn" title="按当前界面参数继续暂停的批量任务。" disabled>继续</button>
        </div>
      </div>
      <div id="inferProgressParams" class="progress-params muted">--</div>
    </div>
  </header>

  <main class="layout annotate-layout" id="annotateLayout">
    <button id="edgeToggleLeft" class="layout-edge-toggle left" title="隐藏左栏">◀</button>
    <button id="edgeToggleRight" class="layout-edge-toggle right" title="隐藏右栏">▶</button>
    <aside class="sidebar left" id="leftSidebar">
      <h3>当前项目</h3>
      <div id="projectMeta" class="meta">加载中...</div>
      <h3>图片列表</h3>
      <div class="nav-row">
        <button id="prevImgBtn" title="切到上一张图片。快捷键 A。">← 上一张 (A)</button>
        <button id="nextImgBtn" title="切到下一张图片。快捷键 D。">下一张 (D) →</button>
        <button id="deleteImageBtn" title="删除当前图片及其对应标注文件。">删除</button>
      </div>
      <div id="imageInfo" class="meta">-</div>
      <div id="imageList" class="list"></div>
    </aside>

    <section class="canvas-wrap">
      <div class="tools">
        <div class="tools-row tools-row-main">
          <div class="tool-group">
            <button id="toolPoint" class="active" title="左键添加点提示；一次只保留一个实例。">点选</button>
            <button id="toolBox" title="左键框选正负样本框，用于视觉提示或范例传播。">框选</button>
            <button id="toolPan" title="切换到平移模式；也可直接按 Alt+左键临时拖拽浏览。">拖拽浏览 (Alt+左键)</button>
          </div>
          <div class="tool-group">
            <button id="labelPos" class="active" title="后续添加的点/框作为正样本。">正样本</button>
            <button id="labelNeg" title="后续添加的点/框作为负样本，用于排除误检。">负样本</button>
          </div>
          <div class="tool-group">
            <button id="undoPromptBtn" title="撤销上一步点/框提示。快捷键 Ctrl+Z。">撤销 (Ctrl+Z)</button>
            <button id="clearPromptBtn" title="清空当前所有点提示和框提示。">清空提示</button>
            <button id="segmentBtn" title="按当前点/框提示做纯视觉预览，不结合类别文本。">预测预览</button>
          </div>
        </div>
        <div class="tools-row tools-row-meta">
          <div class="tool-group tool-group-meta">
            <label><input id="showMask" type="checkbox" checked /> 显示掩码</label>
            <label><input id="showBox" type="checkbox" checked /> 显示框</label>
            <label><input id="autoPromptInfer" type="checkbox" /> 点/框后自动分割</label>
          </div>
          <div class="tool-group tool-group-meta">
            <label title="选择自动分割时走纯视觉单实例预览，还是走当前图范例分割。当前图范例分割仅对框选有效。">模式
              <select id="autoPromptMode">
                <option value="visual_preview">纯视觉预览</option>
                <option value="example_current">当前图范例分割</option>
              </select>
            </label>
          </div>
          <div class="tool-group tool-group-meta tool-group-zoom">
            <label title="快捷键: Ctrl+滚轮 / + / - / 0">缩放</label>
            <span id="zoomValue">100%</span>
          </div>
        </div>
      </div>
      <div class="canvas-container" id="canvasContainer">
        <canvas id="canvas"></canvas>
      </div>
    </section>

    <aside class="sidebar right" id="rightSidebar">
      <h3>类别管理</h3>
      <div class="class-editor">
        <label>添加类别(=Prompt,逗号分隔)</label>
        <input id="classesText" placeholder="例如: black dog, person" />
        <button id="applyClassesBtn" title="按逗号拆分输入内容并追加到类别列表。">添加类别</button>
      </div>
      <div id="classList" class="list"></div>
      <div class="class-editor">
        <label title="勾选后，范例分割/传播只使用正负框视觉提示，不再发送类别文本；结果仍会落到当前类别。">
          <input id="examplePureVisual" type="checkbox" />
          范例纯视觉
        </label>
        <div class="field-hint muted">纯视觉: 不再发送当前类别文本，只使用范例提示本身；结果仍会写回到当前类别。</div>
      </div>
      <h3>当前标注</h3>
      <div class="nav-row">
        <button id="saveAnnBtn" title="保存当前图片已有标注。">保存当前标注</button>
        <button id="clearAnnBtn" title="清空当前图片的全部已保存标注。">清空当前标注</button>
      </div>
      <div id="annList" class="list"></div>
      <h3>预览结果</h3>
      <div class="nav-row">
        <button id="selectAllPreviewBtn" title="一次勾选当前所有预览结果。">全选预览</button>
        <button id="clearPreviewBtn" title="清空当前预览结果，不影响已保存标注。">清空预览</button>
        <button id="commitPreviewBtn" title="将勾选的预览结果追加为正式标注。">完成标注</button>
      </div>
      <div id="previewList" class="list"></div>
    </aside>
  </main>

  <div id="exportModal" class="modal-backdrop hidden">
    <div class="modal-card">
      <h3>导出设置</h3>
      <div class="modal-row">
        <label>导出格式
          <select id="exportFormat">
            <option value="coco">COCO</option>
            <option value="yolo">YOLO</option>
          </select>
        </label>
      </div>
      <div class="modal-row">
        <label><input id="exportBBox" type="checkbox" checked /> 保存 BBox</label>
        <label><input id="exportMask" type="checkbox" /> 保存掩码</label>
      </div>
      <div id="exportHint" class="modal-hint">提示：COCO 的掩码将以 polygon 形式保存。</div>
      <div class="modal-row">
        <label>导出目录（手动输入服务器路径）
          <input id="exportDir" placeholder="默认：图片数据集目录" />
        </label>
      </div>
      <div class="modal-actions">
        <button id="exportConfirmBtn" title="按当前格式与内容设置执行导出。">确认导出</button>
        <button id="exportCancelBtn" title="关闭导出窗口，不执行导出。">取消</button>
      </div>
    </div>
  </div>

  <div id="smartFilterModal" class="modal-backdrop hidden">
    <div class="modal-card">
      <h3>智能过滤</h3>
      <div class="modal-row">
        <label>过滤方式
          <select id="smartFilterMode">
            <option value="same_class">同类合并</option>
            <option value="canonical_class">主从类别合并</option>
          </select>
        </label>
        <label>覆盖率阈值
          <input id="smartFilterCoverage" type="number" min="0.5" max="1" step="0.01" value="0.98" />
        </label>
        <label>面积计算
          <select id="smartFilterAreaMode">
            <option value="instance">实例面积</option>
            <option value="bbox">目标框面积</option>
          </select>
        </label>
      </div>
      <div id="smartFilterCanonicalRow" class="modal-row hidden">
        <label>目标类别
          <select id="smartFilterCanonicalClass"></select>
        </label>
      </div>
      <div id="smartFilterSourceRow" class="modal-row hidden">
        <div class="modal-field-full">
          <div class="modal-field-label">来源类别（勾选后将与目标类别一起参与合并）</div>
          <div id="smartFilterSourceClasses" class="list modal-list smart-filter-source-list"></div>
        </div>
      </div>
      <div id="smartFilterSummary" class="modal-hint">请选择过滤方式并先执行分析预览。提示：当前“主从类别合并”会对“目标类别 + 勾选来源类别”整体做合并，不仅限于跨类别配对。</div>
      <div id="smartFilterList" class="list modal-list"></div>
      <div class="modal-actions">
        <button id="smartFilterPreviewBtn" title="按当前配置扫描项目并预览可合并目标。">分析预览</button>
        <button id="smartFilterApplyBtn" title="按当前规则执行合并，删除被覆盖的小目标并保留较大目标。">确认合并</button>
        <button id="smartFilterCancelBtn" title="关闭窗口，不执行合并。">取消</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js?v=20260320.03"></script>
</body>
</html>
