<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>web-auto 标注工具</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="row">
      <label>项目名 <input id="projectName" placeholder="例如: demo" /></label>
      <label>数据集目录 <input id="imageDir" placeholder="例如: J:\\datasets\\images" /></label>
      <label>标注保存目录 <input id="saveDir" placeholder="可选，不填则使用默认" /></label>
      <button id="openProjectBtn">新建项目</button>
      <button id="refreshProjectsBtn">刷新项目列表</button>
      <button id="closeProjectBtn">退出当前项目</button>
      <button id="deleteProjectBtn">删除当前项目</button>
    </div>
    <div class="row">
      <label>API地址 <input id="apiBaseUrl" value="http://172.16.1.65:8001" /></label>
      <button id="testApiBtn">测试API</button>
      <label>阈值 <input id="threshold" type="number" min="0" max="1" step="0.01" value="0.5" /></label>
    </div>
    <div class="row">
      <button id="inferCurrentBtn">一键推理: 当前图片 + 已选类别</button>
      <button id="inferAllBtn">一键推理: 全部图片 + 已选类别</button>
      <label>导出格式
        <select id="exportFormat">
          <option value="coco">COCO(默认)</option>
          <option value="json">JSON(COCO)</option>
          <option value="yolo">YOLO</option>
        </select>
      </label>
      <label>导出目录 <input id="exportDir" placeholder="可选" /></label>
      <button id="exportBtn">导出</button>
      <span id="status" class="status"></span>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar left">
      <h3>项目管理</h3>
      <div id="projectList" class="list"></div>
      <h3>当前项目</h3>
      <div id="projectMeta" class="meta">未加载项目</div>
      <h3>图片列表</h3>
      <div class="nav-row">
        <button id="prevImgBtn">上一张</button>
        <button id="nextImgBtn">下一张</button>
      </div>
      <div id="imageInfo" class="meta">-</div>
      <div id="imageList" class="list"></div>
    </aside>

    <section class="canvas-wrap">
      <div class="tools">
        <div class="tool-group">
          <button id="toolPoint" class="active">点选</button>
          <button id="toolBox">框选</button>
          <button id="toolPan">拖拽浏览</button>
        </div>
        <div class="tool-group">
          <button id="labelPos" class="active">正样本</button>
          <button id="labelNeg">负样本</button>
        </div>
        <div class="tool-group">
          <button id="undoPromptBtn">撤销 (Ctrl+Z)</button>
          <button id="clearPromptBtn">清空提示</button>
          <button id="segmentBtn">分割/更新</button>
        </div>
        <div class="tool-group">
          <label><input id="showMask" type="checkbox" checked /> 显示掩码</label>
          <label><input id="showBox" type="checkbox" checked /> 显示框</label>
        </div>
        <div class="tool-group">
          <button id="zoomOutBtn">-</button>
          <label>缩放 <input id="zoomSlider" type="range" min="10" max="400" step="5" value="100" /></label>
          <span id="zoomValue">100%</span>
          <button id="zoomInBtn">+</button>
          <button id="fitViewBtn">适应屏幕</button>
        </div>
      </div>
      <div class="canvas-container" id="canvasContainer">
        <canvas id="canvas"></canvas>
      </div>
    </section>

    <aside class="sidebar right">
      <h3>类别管理</h3>
      <div class="class-editor">
        <label>类别(=Prompt,逗号分隔)</label>
        <input id="classesText" placeholder="black dog, person" />
        <button id="applyClassesBtn">更新类别</button>
      </div>
      <div id="classList" class="list"></div>
      <h3>当前标注</h3>
      <div class="nav-row">
        <button id="saveAnnBtn">保存当前标注</button>
        <button id="clearAnnBtn">清空当前标注</button>
      </div>
      <div id="annList" class="list"></div>
    </aside>
  </main>

  <script src="/static/app.js?v=20260303.2"></script>
</body>
</html>
